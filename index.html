<style>
        body {
            background-color: #131313;
            color: #e5e2e1;
            -webkit-tap-highlight-color: transparent;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .message-entrance {
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reaction-scale:active {
            transform: scale(1.4);
            transition: transform 0.1s ease;
        }
        .glass-header {
            background: rgba(19, 19, 19, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .waveform-bar {
            width: 3px;
            background-color: currentColor;
            border-radius: 99px;
        }
        /* Custom scrollbar for better look */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    
        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .recording-active {
            background-color: #ef4444 !important;
            color: white !important;
            border-radius: 9999px;

<body class="font-body-md text-body-md overflow-hidden h-[100dvh] flex flex-col">

</div>

<!-- Main Chat Area -->

<!-- Bottom Input Field -->
<footer class="shrink-0 glass-header px-4 py-3 flex items-end gap-2 border-t border-white/5 z-50">

<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
</button>

<div class="flex items-center shrink-0">

</button>

</div>
</div>

</button>

<script src="http://172.20.10.6:3000/socket.io/socket.io.js"></script>
<script>
    // Auto-resize textarea
    const textarea = document.querySelector('textarea');
    textarea.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
        // Limit max height to 128px as per tailwind max-h-32
        if (this.scrollHeight > 128) {
            this.style.overflowY = 'auto';
        } else { 
            this.style.overflowY = 'hidden';
        }
    });
</script>
<input accept="image/*" class="hidden" id="image-input" type="file"/>
<script>
    const socket = io('http://172.20.10.6:3000')
    const imageInput = document.getElementById('image-input');
    const galleryButton = document.getElementById('gallery-button');
    const chatMain = document.querySelector('main');
    const snd_btn = document.getElementById('send-msg');
    const msg_field = document.getElementById('msg-field');
    const chat_id = 45;

    const scrollToBottom = () => {
        chatMain.scrollTo({
            top: chatMain.scrollHeight,
            behavior: 'smooth'
        });
    };

    galleryButton.addEventListener('click', () => {
        imageInput.click();
    });

    snd_btn.addEventListener('click', ()=>{
        if(!msg_field.value) return;
        criarMensagemTexto({
            texto: msg_field.value,
            isMe: true,
            reply: null
        });
        const msg = {
            text: msg_field.value,
            type:'text',
            chat_id
        }
        socket.emit('send_message', msg)
        msg_field.value = ''
    });

    socket.emit('teste_entrar', chat_id);

    socket.on('new_message', (info)=>{
        if(info.msg.type === 'text') {
            criarMensagemTexto(
                {
                    texto:info.msg.text,
                    isMe: info.token_id === socket.id,
                    reply:null,
                }
            )
        }else if(info.msg.type === 'audio') {
            criarMensagemAudio(info.msg.audio, info.token_id === socket.id)
        }else if(info.msg.type === 'image') {
            criarMensagemImagem(info.msg.image, info.token_id === socket.id)
        }
    })


    function criarMensagemImagem(imageUrl, isMe = true) {
    const now = new Date();
    const time = now.getHours().toString().padStart(2, '0') + ':' +
                 now.getMinutes().toString().padStart(2, '0');

    const containerClass = isMe
        ? "items-end self-end"
        : "items-start";

    const bubbleClass = isMe
        ? "bg-[#5865F2]"
        : "bg-surface-container-high";

    const borderRadius = isMe
        ? "rounded-tr-none"
        : "rounded-tl-none";

    const checkIcon = isMe
        ? `<span class="material-symbols-outlined text-[12px] text-secondary" style="font-variation-settings: 'FILL' 1;">done_all</span>`
        : "";

    const timeClass = isMe ? "mr-1" : "ml-1";

    const html = `
    <div class="flex flex-col gap-1 max-w-[85%] message-entrance shrink-0 ${containerClass}">
        
        <div class="${bubbleClass} p-1 rounded-2xl ${borderRadius} border border-white/10 overflow-hidden shadow-lg">
            <img src="${imageUrl}" class="w-full max-h-[40vh] object-cover rounded-xl">
        </div>

        <div class="flex items-center gap-1 ${timeClass}">
            <span class="text-[10px] text-zinc-500">${time}</span>
            ${checkIcon}
        </div>

    </div>
    `;

    chatMain.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
}

    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const imageUrl = event.target.result;
                
                criarMensagemImagem(imageUrl, true);
                const msg = {
                    image:imageUrl,
                    type:'image',
                    chat_id
                }
                socket.emit('send_message', msg);
                scrollToBottom();
                imageInput.value = ''; // Reset input
            };
            reader.readAsDataURL(file);
        }
    });
</script><script src="script.js"></script>
</body></html>
